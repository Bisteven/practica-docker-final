services:
  db:
    image: postgres:16-alpine
    container_name: teslo-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PUBLISH_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - teslo-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./tesloshop-app/teslo-shop
    container_name: teslo-backend
    environment:
      APP_VERSION: ${APP_VERSION}
      STAGE: ${STAGE}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      PORT: ${PORT}
      HOST_API: ${HOST_API}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${BACKEND_PUBLISH_PORT}:${PORT}"
    volumes:
      - backend_static:/app/static
    depends_on:
      db:
        condition: service_healthy
    networks:
      - teslo-net

  frontend:
    build:
      context: ./tesloshop-app/angular-tesloshop
    container_name: teslo-frontend
    ports:
      - "${FRONTEND_PUBLISH_PORT}:80"
    depends_on:
      - backend
    networks:
      - teslo-net

volumes:
  postgres_data:
  backend_static:

networks:
  teslo-net:
    driver: bridge
